# ============================================================
# CLI 工具配置
# ============================================================
[cli]
color_output = true
verbose = false

# 自定义进入交互模式的触发关键词
# 配置后，运行 `orchestrate <关键词>` 即可直接进入 chat 交互模式
# 例如：orchestrate zxh  或  orchestrate ai
chat_triggers = ["zxh", "ai", "chat"]

# ============================================================
# PostgreSQL 数据库配置
# ============================================================
[postgres]
# 数据库主机地址
host = "localhost"
# 数据库端口（默认 5432）
port = 5432
# 数据库名称
database = "your_database"
# 数据库用户名
user = "your_user"
# 数据库密码（生产环境建议通过环境变量 APP_POSTGRES_PASSWORD 注入）
password = "your_password_here"
# 连接池最大连接数
max_connections = 20
# 连接池最小空闲连接数
min_connections = 2
# 连接超时时间（秒）
connect_timeout_secs = 10
# 空闲连接超时时间（秒），0 表示不超时
idle_timeout_secs = 600
# 是否启用 SSL（生产环境建议开启）
ssl_enabled = false
# SSL 证书路径（ssl_enabled = true 时需要配置）
# ssl_cert_path = "/path/to/server.crt"

# ============================================================
# Redis 缓存配置
# ============================================================
[redis]
# Redis 主机地址
host = "localhost"
# Redis 端口（默认 6379）
port = 6379
# 使用的数据库索引（0-15）
db = 0
# 认证密码（未设置密码时注释掉此行）
# password = "your_redis_password"
# 连接池最大连接数
pool_size = 10
# 连接超时时间（秒）
connect_timeout_secs = 5
# 命令执行超时时间（秒）
command_timeout_secs = 3
# 默认缓存 TTL（秒），0 表示永不过期
default_ttl_secs = 3600
# 键名前缀（用于多服务共享 Redis 时隔离命名空间）
key_prefix = "tos:"
# 是否启用 TLS（生产环境建议开启）
tls_enabled = false
